services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5057:5057"
    environment:
      CONSENSO_MONGO_URI: mongodb://mongo:27017
      CONSENSO_DB: consenso
      CONSENSO_NUM_CHAINS: "4"
      # opzionale: chiave per gli scenari AI (DeepSeek). Senza, la dashboard
      # funziona tutta tranne la generazione scenari.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      - mongo

volumes:
  mongo-data:
